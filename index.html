<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#38bdf8" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="GW Pool" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/logo.jpg" />
  <link rel="icon" type="image/jpeg" href="/logo.jpg" />
  <title>Glistening Water Pool Services</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #0d1117; color: #e6edf3; }
    #root { min-height: 100svh; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Supabase JS (loaded before app bundle) -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>

  <!-- App bundle (Vite output) -->
  <script type="module" src="/src/main.jsx"></script>

  <!-- Service Worker registration -->
  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/service-worker.js")
          .then(reg => {
            console.log("SW registered:", reg.scope);
            // Listen for sync requests from SW
            navigator.serviceWorker.addEventListener("message", (e) => {
              if (e.data?.type === "SYNC_REQUEST") {
                window.dispatchEvent(new Event("pool_sync_request"));
              }
            });
          })
          .catch(err => console.warn("SW failed:", err));
      });
    }
  </script>
</body>
</html>
